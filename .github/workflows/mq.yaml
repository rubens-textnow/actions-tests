name: Merge queue checks (main)
on:
  workflow_call:
  workflow_dispatch:
  merge_group:
    types: [ checks_requested ]
    branches:
      - main
  # Added for the repro since personal-account repos can't enable the merge
  # queue. pull_request fires the same job graph on PR open / sync, which is
  # what we want to exercise.
  pull_request:
    branches:
      - main

concurrency:
  group: merge-queue-${{ github.ref }}
  cancel-in-progress: false

jobs:

  resolve-stage-runtime:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is_hotfix: ${{ steps.resolve.outputs.is_hotfix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Resolve hotfix flag from merge group PR labels
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/resolve-stage-runtime.sh

  trigger-stage-deploy:
    needs:
      - resolve-stage-runtime
    uses: ./.github/workflows/auto-deploy.yaml
    with:
      target_env: 'stage'
      new_tag: 'build-${{ github.run_id }}'

  # Skipped on hotfix runs (mirrors textnow-server stage-backend-test).
  stage-backend-test:
    if: needs.resolve-stage-runtime.outputs.is_hotfix != 'true'
    needs:
      - resolve-stage-runtime
      - trigger-stage-deploy
    runs-on: ubuntu-latest
    steps:
      - run: echo "running stage backend tests"

  # Absorbs the skipped stage-backend-test into a success result (mirror).
  stage-backend-test-gate:
    needs:
      - resolve-stage-runtime
      - stage-backend-test
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - run: echo "gate result=${{ needs.stage-backend-test.result }}"

  trigger-canary-deploy:
    if: |
      always() && !cancelled() &&
      needs.resolve-stage-runtime.outputs.is_hotfix != 'true'
    needs:
      - resolve-stage-runtime
      - trigger-stage-deploy
      - stage-backend-test-gate
    uses: ./.github/workflows/manual-deploy.yaml
    secrets: inherit
    with:
      target_env: 'canary'
      new_tag: 'rc-${{ github.run_id }}'

  trigger-canary-deploy-hotfix:
    if: |
      always() && !cancelled() &&
      needs.resolve-stage-runtime.outputs.is_hotfix == 'true'
    needs:
      - resolve-stage-runtime
      - trigger-stage-deploy
      - stage-backend-test-gate
    uses: ./.github/workflows/auto-deploy.yaml
    with:
      target_env: 'canary'
      new_tag: 'rc-${{ github.run_id }}'

  # Fan-in over the two canary variants. Exactly one runs per pipeline; the
  # other is skipped by its own `if:`. `always() && !cancelled()` rescues the
  # skip so default needs-success semantics don't cascade and short-circuit
  # prod. Prod always uses the gated manual-deploy.yaml regardless of hotfix.
  trigger-prod-deploy:
    if: |
      always() && !cancelled() &&
      (needs.trigger-canary-deploy.result == 'success' ||
       needs.trigger-canary-deploy-hotfix.result == 'success')
    needs:
      - resolve-stage-runtime
      - trigger-canary-deploy
      - trigger-canary-deploy-hotfix
    uses: ./.github/workflows/manual-deploy.yaml
    secrets: inherit
    with:
      target_env: 'prod'
      new_tag: 'prod-${{ github.run_id }}'

  merge-queue-gate-checklist:
    runs-on: ubuntu-latest
    needs:
      - resolve-stage-runtime
      - trigger-stage-deploy
      - stage-backend-test
      - stage-backend-test-gate
      - trigger-canary-deploy
      - trigger-canary-deploy-hotfix
      - trigger-prod-deploy
    if: ${{ always() }}
    steps:
      - name: Log all job results
        run: |
          echo "Summary of job statuses:"
          echo '${{ toJSON(needs) }}' | jq -r 'to_entries[] | "\(.key): \(.value.result)"'

      - name: Fail if any dependency failed or was cancelled
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1

      - name: Deployment Successful
        run: echo "All required jobs succeeded."

name: Manual Deploy to environment

# Reverted to pre-hotfix shape: no `is_hotfix` input, no conditional env
# expression. The called workflow stays unconditional — hotfix routing
# happens in the caller (mq.yaml), which picks `auto-deploy.yaml` instead
# of this workflow when is_hotfix=true. This mirrors textnow-server
# PR #13133's approach (caller-side split).

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: Target environment to deploy
      new_tag:
        required: true
        type: string
        description: Built image tag
    outputs:
      deploy_commit_hash:
        description: Full hash of the deploy/images commit (faked)
        value: ${{ jobs.check-and-deploy.outputs.deploy_commit_hash }}
      common_argocd_revision:
        description: Faked previous revision SHA (only set for prod)
        value: ${{ jobs.dora-get-previous-revision.outputs.common_argocd_revision }}
    secrets:
      TEST_PAT:
        required: true

jobs:

  trigger-deployment:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    steps:
      - name: Deployment gate cleared
        run: |
          echo "target_env=${{ inputs.target_env }}"

  dora-get-previous-revision:
    needs:
      - trigger-deployment
    if: inputs.target_env == 'prod'
    uses: ./.github/workflows/get-previous-revision.yaml
    secrets:
      GH_TOKEN: ${{ secrets.TEST_PAT }}

  check-and-deploy:
    needs:
      - trigger-deployment
    uses: ./.github/workflows/check-and-deploy.yaml
    secrets: inherit
    with:
      target_env: ${{ inputs.target_env }}
      new_tag: ${{ inputs.new_tag }}

name: Manual Deploy to environment

# Mirrors textnow-server/.github/workflows/mq-manual-deploy.yaml as closely as
# possible:
#   - declares `outputs:` referencing nested-call outputs
#   - declares a required secret (TEST_PAT, stand-in for ENFLICK_BUILD_PAT)
#   - has three jobs: trigger-deployment (env gate), dora-get-previous-revision
#     (prod-only, calls a nested reusable workflow), check-and-deploy (calls a
#     nested reusable workflow)

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: Target environment to deploy
      new_tag:
        required: true
        type: string
        description: Built image tag
      is_hotfix:
        required: false
        type: boolean
        default: false
        description: When true, route trigger-deployment to a no-approval environment.
    outputs:
      deploy_commit_hash:
        description: Full hash of the deploy/images commit (faked)
        value: ${{ jobs.check-and-deploy.outputs.deploy_commit_hash }}
      common_argocd_revision:
        description: Faked previous revision SHA (only set for prod)
        value: ${{ jobs.dora-get-previous-revision.outputs.common_argocd_revision }}
    secrets:
      TEST_PAT:
        required: true

jobs:

  trigger-deployment:
    runs-on: ubuntu-latest
    # No `environment:` and no job-level `if:` — the approval gate is a
    # *step* below, so this job always schedules. Step-level `if:` is
    # evaluated by the runner at step time, not by GitHub's scheduler at
    # job time, which avoids the silent-skip behavior we hit with the
    # env-swap approach.
    permissions:
      issues: write          # trstringer/manual-approval creates an issue
      contents: read
      pull-requests: read
    steps:
      - name: Wait for human approval (skipped only for hotfix + non-prod)
        # Approval required unless this is a hotfix targeting a non-prod
        # environment. Prod ALWAYS requires approval, regardless of is_hotfix
        # — same safety invariant the env-swap expression had.
        #
        #   is_hotfix | target_env | approval step runs?
        #   ----------|------------|---------------------
        #   false     | canary     | yes (waits for approver)
        #   false     | prod       | yes (waits for approver)
        #   true      | canary     | NO  (skipped — hotfix fast-path)
        #   true      | prod       | yes (prod never auto-deploys)
        if: ${{ inputs.target_env == 'prod' || !inputs.is_hotfix }}
        # Pin to a specific release tag here for the repro; in production
        # pin to a full commit SHA so the action can't be mutated under you.
        uses: trstringer/manual-approval@v1.9.0
        with:
          secret: ${{ github.token }}
          approvers: rubens-textnow
          minimum-approvals: 1
          issue-title: "Approve ${{ inputs.target_env }} deploy (${{ inputs.new_tag }})"
          issue-body: |
            Approve this deploy by commenting `approved`, `approve`, `lgtm`, or `yes`.
            Reject by commenting `denied`, `deny`, or `no`.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Gate cleared
        run: |
          echo "is_hotfix=${{ inputs.is_hotfix }} target_env=${{ inputs.target_env }}"

  dora-get-previous-revision:
    needs:
      - trigger-deployment
    if: inputs.target_env == 'prod'
    uses: ./.github/workflows/get-previous-revision.yaml
    secrets:
      GH_TOKEN: ${{ secrets.TEST_PAT }}

  check-and-deploy:
    needs:
      - trigger-deployment
    uses: ./.github/workflows/check-and-deploy.yaml
    secrets: inherit
    with:
      target_env: ${{ inputs.target_env }}
      new_tag: ${{ inputs.new_tag }}
